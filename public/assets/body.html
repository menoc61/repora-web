
<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 794px; height: 1123px; background: #fafbfc; position: relative; overflow: hidden; }
.sidebar { position: absolute; left: 0; top: 0; width: 6px; height: 100%; background: linear-gradient(to bottom, #3182ce, #63b3ed, #3182ce); }
.corner-tl { position: absolute; top: 40px; left: 50px; width: 30px; height: 30px; border-top: 2px solid rgba(49, 130, 206, 0.15); border-left: 2px solid rgba(49, 130, 206, 0.15); }
.corner-br { position: absolute; bottom: 40px; right: 50px; width: 30px; height: 30px; border-bottom: 2px solid rgba(49, 130, 206, 0.15); border-right: 2px solid rgba(49, 130, 206, 0.15); }
</style>
</head>
<body>
<div class="sidebar"></div>
<div class="corner-tl"></div>
<div class="corner-br"></div>
</body>
</html>
