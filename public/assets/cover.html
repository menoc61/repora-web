
<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 794px; height: 1123px; background: linear-gradient(135deg, #1a365d 0%, #2c5282 40%, #3182ce 100%); position: relative; overflow: hidden; }
.circle1 { position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%); top: -100px; right: -100px; }
.circle2 { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%); bottom: 100px; left: -80px; }
.line1 { position: absolute; width: 3px; height: 300px; background: linear-gradient(to bottom, rgba(255,255,255,0.3), transparent); top: 200px; left: 80px; }
.line2 { position: absolute; width: 200px; height: 3px; background: linear-gradient(to right, rgba(255,255,255,0.2), transparent); top: 350px; left: 80px; }
.dots { position: absolute; bottom: 60px; right: 60px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.25); }
.accent { position: absolute; bottom: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, #63b3ed, #4299e1, #3182ce); }
.hex { position: absolute; top: 150px; right: 100px; width: 120px; height: 120px; border: 2px solid rgba(255,255,255,0.1); transform: rotate(45deg); }
.hex2 { position: absolute; top: 170px; right: 120px; width: 80px; height: 80px; border: 2px solid rgba(255,255,255,0.15); transform: rotate(45deg); }
</style>
</head>
<body>
<div class="circle1"></div>
<div class="circle2"></div>
<div class="line1"></div>
<div class="line2"></div>
<div class="hex"></div>
<div class="hex2"></div>
<div class="dots">
<div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
</div>
<div class="accent"></div>
</body>
</html>
