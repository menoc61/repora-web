
<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 794px; height: 1123px; background: linear-gradient(135deg, #2c5282 0%, #1a365d 60%, #1a202c 100%); position: relative; overflow: hidden; }
.circle1 { position: absolute; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%); bottom: -100px; left: -100px; }
.circle2 { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%); top: 100px; right: -50px; }
.accent { position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, #63b3ed, #4299e1, #3182ce); }
.line { position: absolute; width: 150px; height: 2px; background: rgba(255,255,255,0.2); top: 50%; left: 50%; transform: translateX(-50%); }
</style>
</head>
<body>
<div class="circle1"></div>
<div class="circle2"></div>
<div class="accent"></div>
<div class="line"></div>
</body>
</html>
