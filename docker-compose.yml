# Docker Compose — Repora Web
# ─────────────────────────────────────────────────────────────
# Quick start:  docker compose up
# Frontend → http://localhost:3000
# Backend  → http://localhost:8001
# MinIO    → http://localhost:9001 (console) / http://localhost:9000 (S3 API)

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports: ["3000:80"]
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports: ["8001:8000"]
    environment:
      - DATABASE_URL=postgres://repora:repora@db:5432/repora
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      - OLLAMA_URL=http://${OLLAMA_HOST:-host.docker.internal}:11434/v1
      - OLLAMA_MODEL=${OLLAMA_MODEL:-}
      - CORS_ORIGIN=http://localhost:3000
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=repora-exports
      - S3_REGION=us-east-1
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "--input-type=module", "-e", "fetch('http://localhost:8000/healthz').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  db:
    image: postgres:17
    environment:
      - POSTGRES_USER=repora
      - POSTGRES_PASSWORD=repora
      - POSTGRES_DB=repora
    ports: ["5434:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repora -d repora"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes: [miniodata:/data]
    healthcheck:
      test: ["CMD-SHELL", "sleep 3 && test -f /data/.minio.sys/format.json"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
