services:
  frontend:
    build: .
    ports: ["3000:80"]
    depends_on: [backend]

  backend:
    build: backend/
    ports: ["8000:8000"]
    environment:
      - DATABASE_URL=postgres://repora:repora@db:5432/repora
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      - OLLAMA_URL=http://host.docker.internal:11434/v1
      - CORS_ORIGIN=http://localhost:3000
    depends_on: [db]
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    image: postgres:17
    environment:
      - POSTGRES_USER=repora
      - POSTGRES_PASSWORD=repora
      - POSTGRES_DB=repora
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

volumes:
  pgdata:
