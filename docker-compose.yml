services:
  frontend:
    build: .
    ports: ["3000:80"]
    depends_on:
      backend:
        condition: service_started

  backend:
    build: backend/
    ports: ["8001:8000"]
    environment:
      - DATABASE_URL=postgres://repora:repora@db:5432/repora
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      - OLLAMA_URL=http://host.docker.internal:11434/v1
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  db:
    image: postgres:17
    environment:
      - POSTGRES_USER=repora
      - POSTGRES_PASSWORD=repora
      - POSTGRES_DB=repora
    ports: ["5433:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repora -d repora"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
